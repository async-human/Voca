<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vokal App — Your voice. Perfectly expressed.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F0EAE1;--ink:#1C1814;--muted:#897D72;--faint2:#DDD5CA;
  --accent:#BF3B2A;--accent2:#D94F3C;--teal:#2A7A72;
}
body{font-family:'Instrument Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:24px 20px 64px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-top:12px}
.logo{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;text-decoration:none;color:var(--ink)}
.logo em{font-style:italic;color:var(--accent)}
.back{font-size:13px;color:var(--muted);text-decoration:none}
.back:hover{color:var(--ink)}
.card{background:#fff;border:1px solid var(--faint2);border-radius:20px;padding:28px 24px;margin-bottom:16px}
h1{font-family:'Libre Baskerville',serif;font-size:clamp(24px,5vw,32px);line-height:1.2;margin-bottom:8px}
.sub{font-size:15px;color:var(--muted);line-height:1.6;margin-bottom:20px}
label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input[type=email]{width:100%;padding:12px 16px;border:1px solid var(--faint2);border-radius:12px;font-size:15px;background:var(--paper);margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:100px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:var(--accent)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-record{background:var(--accent);color:#fff;width:80px;height:80px;border-radius:50%;font-size:28px;padding:0;margin:0 auto;display:flex}
.btn-record.recording{background:#c0392b;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(191,59,42,.4)}50%{box-shadow:0 0 0 14px rgba(191,59,42,0)}}
.formats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.fmt{padding:8px 16px;border-radius:100px;border:1px solid var(--faint2);background:var(--paper);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.fmt.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.record-area{text-align:center;padding:24px 0}
.timer{font-family:'DM Mono',monospace;font-size:32px;margin:16px 0;color:var(--ink)}
.hint{font-size:13px;color:var(--muted)}
.steps{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.step.active{color:var(--ink);font-weight:600}
.step.done{color:var(--teal)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--faint2);flex-shrink:0}
.step.active .dot{background:var(--accent);animation:pulse 1s infinite}
.step.done .dot{background:var(--teal)}
.output-box{background:var(--paper);border:1px solid var(--faint2);border-radius:14px;padding:20px;font-size:15px;line-height:1.7;white-space:pre-wrap;margin-bottom:16px}
.meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:12px}
.explanation{border-left:3px solid var(--accent);padding:10px 14px;margin-bottom:10px;background:rgba(191,59,42,.04);border-radius:0 10px 10px 0}
.ex-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.ex-text{font-size:13px;line-height:1.55;color:var(--ink)}
.error{background:rgba(191,59,42,.1);color:var(--accent);padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:12px}
.hidden{display:none!important}
.user-bar{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:12px}
.score{display:inline-block;padding:4px 10px;border-radius:100px;background:rgba(42,122,114,.12);color:var(--teal);font-family:'DM Mono',monospace;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="logo" href="/">Vokal</a>
    <div class="user-bar">
      <span id="userEmail"></span>
      <a class="back" href="/">← Landing</a>
    </div>
  </div>

  <!-- Auth -->
  <div class="card" id="authCard">
    <h1>Sign in to <em>Vokal</em></h1>
    <p class="sub">Early access app. We’ll send a magic link to your email — no password needed.</p>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    <button class="btn btn-primary" id="loginBtn" type="button">Send magic link →</button>
    <p class="hint" id="authMsg" style="margin-top:12px"></p>
  </div>

  <!-- App -->
  <div id="appArea" class="hidden">
    <div class="card">
      <h1>Speak. We’ll polish it.</h1>
      <p class="sub">Record up to 60 seconds. Pick a format. Vokal transcribes, understands intent, and writes in your voice.</p>
      <label>Output format</label>
      <div class="formats" id="formats">
        <button type="button" class="fmt active" data-fmt="email">Email</button>
        <button type="button" class="fmt" data-fmt="slack">Slack</button>
        <button type="button" class="fmt" data-fmt="report">Report</button>
        <button type="button" class="fmt" data-fmt="linkedin">LinkedIn</button>
        <button type="button" class="fmt" data-fmt="journal">Journal</button>
      </div>
      <div class="record-area">
        <button type="button" class="btn-record" id="recordBtn" title="Record">●</button>
        <div class="timer" id="timer">0:00</div>
        <p class="hint" id="recordHint">Tap to record · max 60 seconds</p>
      </div>
    </div>

    <div class="card hidden" id="progressCard">
      <label>Processing</label>
      <div class="steps" id="steps"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <label style="margin:0">Your output</label>
        <span class="score hidden" id="clarityScore"></span>
      </div>
      <div class="meta hidden" id="outputMeta"></div>
      <div class="output-box" id="outputText"></div>
      <label>Why we changed it</label>
      <div id="explanations"></div>
      <div style="margin-top:16px">
        <label>Switch format (no re-recording)</label>
        <div class="formats" id="regenFormats"></div>
      </div>
    </div>

    <div class="error hidden" id="errorBox"></div>
  </div>
</div>

<script>
const API = window.VOCA_API_URL || 'http://localhost:3001';
const SUPABASE_URL = window.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;

const PIPELINE_STEPS = ['transcribing','cleaning','understanding','generating','critiquing','explaining','complete'];
const STEP_LABELS = {
  queued:'Queued', transcribing:'Transcribing', cleaning:'Cleaning speech',
  understanding:'Understanding intent', generating:'Writing in your voice',
  critiquing:'Self-critique pass', explaining:'Explaining changes', complete:'Done'
};

let supabase, session, mediaRecorder, chunks = [], recording = false;
let timerInterval, seconds = 0, selectedFormat = 'email', currentSessionId = null;

const authCard = document.getElementById('authCard');
const appArea = document.getElementById('appArea');
const authMsg = document.getElementById('authMsg');
const errorBox = document.getElementById('errorBox');

function showError(msg){
  errorBox.textContent = msg;
  errorBox.classList.remove('hidden');
}
function clearError(){ errorBox.classList.add('hidden'); }

async function init(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY){
    authMsg.textContent = 'Missing Supabase config. Set SUPABASE_URL and SUPABASE_ANON_KEY in Vercel env vars.';
    return;
  }
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const { data: { session: s } } = await supabase.auth.getSession();
  if(s) onAuth(s);
  supabase.auth.onAuthStateChange((_e, s) => { if(s) onAuth(s); });

  if(window.location.hash.includes('access_token')){
    await supabase.auth.getSession();
    history.replaceState(null, '', window.location.pathname);
  }
}

function onAuth(s){
  session = s;
  authCard.classList.add('hidden');
  appArea.classList.remove('hidden');
  document.getElementById('userEmail').textContent = s.user.email || '';
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('email').value.trim();
  if(!email) return;
  authMsg.textContent = 'Sending link…';
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/app.html' }
  });
  authMsg.textContent = error ? error.message : 'Check your email for the magic link.';
});

document.getElementById('formats').addEventListener('click', e=>{
  const btn = e.target.closest('.fmt');
  if(!btn) return;
  document.querySelectorAll('#formats .fmt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedFormat = btn.dataset.fmt;
});

function renderSteps(current){
  const el = document.getElementById('steps');
  el.innerHTML = PIPELINE_STEPS.map(step=>{
    const idx = PIPELINE_STEPS.indexOf(step);
    const curIdx = PIPELINE_STEPS.indexOf(current);
    const cls = idx < curIdx ? 'done' : idx === curIdx ? 'active' : '';
    return `<div class="step ${cls}"><span class="dot"></span>${STEP_LABELS[step]||step}</div>`;
  }).join('');
  document.getElementById('progressCard').classList.remove('hidden');
}

document.getElementById('recordBtn').addEventListener('click', async ()=>{
  if(recording) stopRecording();
  else await startRecording();
});

async function startRecording(){
  clearError();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4' });
    mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => uploadRecording(new Blob(chunks, { type: mediaRecorder.mimeType }));
    mediaRecorder.start(250);
    recording = true;
    seconds = 0;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordHint').textContent = 'Recording… tap to stop';
    timerInterval = setInterval(()=>{
      seconds++;
      const m = Math.floor(seconds/60), s = seconds%60;
      document.getElementById('timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
      if(seconds >= 60) stopRecording();
    }, 1000);
  }catch(err){
    showError('Microphone access denied or unavailable.');
  }
}

function stopRecording(){
  if(!recording) return;
  recording = false;
  clearInterval(timerInterval);
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('recordHint').textContent = 'Processing…';
  if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  mediaRecorder?.stream?.getTracks().forEach(t=>t.stop());
}

async function uploadRecording(blob){
  document.getElementById('resultCard').classList.add('hidden');
  renderSteps('transcribing');

  const token = session?.access_token;
  if(!token){ showError('Not signed in.'); return; }

  const fd = new FormData();
  fd.append('audio', blob, 'recording.webm');
  fd.append('format', selectedFormat);
  fd.append('duration_ms', String(seconds * 1000));

  try{
    const res = await fetch(`${API}/api/v1/voice/process`, {
      method:'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: fd
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || data.error || 'Upload failed');
    currentSessionId = data.session_id;
    pollSession(data.session_id);
  }catch(err){
    showError(err.message);
    document.getElementById('recordHint').textContent = 'Tap to record · max 60 seconds';
  }
}

async function pollSession(id){
  const token = session.access_token;

  const poll = async ()=>{
    const res = await fetch(`${API}/api/v1/sessions/${id}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if(!res.ok){ showError(data.detail || 'Failed to fetch session'); return; }

    if(data.pipeline_step) renderSteps(data.pipeline_step === 'failed' ? 'complete' : data.pipeline_step);

    if(data.status === 'complete'){
      showResult(data);
      document.getElementById('recordHint').textContent = 'Tap to record · max 60 seconds';
      document.getElementById('progressCard').classList.add('hidden');
      return;
    }
    if(data.status === 'failed'){
      showError(data.error_message || 'Processing failed');
      document.getElementById('progressCard').classList.add('hidden');
      document.getElementById('recordHint').textContent = 'Tap to try again';
      return;
    }
    setTimeout(poll, 1200);
  };
  poll();
}

function showResult(data){
  const gen = data.generation;
  if(!gen) return;
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('outputText').textContent = gen.output_text;

  const meta = gen.output_meta || {};
  const metaEl = document.getElementById('outputMeta');
  if(meta.subject){
    metaEl.textContent = `Subject: ${meta.subject}`;
    metaEl.classList.remove('hidden');
  } else metaEl.classList.add('hidden');

  if(data.clarity_score){
    const sc = document.getElementById('clarityScore');
    sc.textContent = `Clarity ${Math.round(data.clarity_score)}`;
    sc.classList.remove('hidden');
  }

  document.getElementById('explanations').innerHTML = (gen.explanations||[]).map(ex=>`
    <div class="explanation">
      <div class="ex-tag">${ex.tag||ex.label||'Change'}</div>
      <div class="ex-text">${ex.text||''}</div>
    </div>`).join('');

  const regen = document.getElementById('regenFormats');
  regen.innerHTML = ['email','slack','report','linkedin','journal']
    .filter(f=>f!==gen.format)
    .map(f=>`<button type="button" class="fmt" data-regen="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('');
}

document.getElementById('regenFormats').addEventListener('click', async e=>{
  const btn = e.target.closest('[data-regen]');
  if(!btn || !currentSessionId) return;
  const format = btn.dataset.regen;
  btn.disabled = true;
  try{
    const res = await fetch(`${API}/api/v1/sessions/${currentSessionId}/regenerate`, {
      method:'POST',
      headers:{
        Authorization:`Bearer ${session.access_token}`,
        'Content-Type':'application/json'
      },
      body: JSON.stringify({ format })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'Regenerate failed');
    const sessionRes = await fetch(`${API}/api/v1/sessions/${currentSessionId}`, {
      headers:{ Authorization:`Bearer ${session.access_token}` }
    });
    showResult(await sessionRes.json());
  }catch(err){ showError(err.message); }
  btn.disabled = false;
});

init();
</script>
</body>
</html>
